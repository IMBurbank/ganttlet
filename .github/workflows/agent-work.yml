name: Agent Work

on:
  issues:
    types: [labeled]

jobs:
  agent:
    if: github.event.label.name == 'agent-ready'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Link workflow run to issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "🤖 Agent workflow started: [Run #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install dependencies
        run: npm install

      - name: Build WASM
        run: npm run build:wasm

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install LSP binaries for Claude Code plugins
        run: |
          npm install -g typescript-language-server typescript
          rustup component add rust-analyzer

      - name: Cache Claude Code plugins
        uses: actions/cache@v4
        with:
          path: ~/.claude/plugins
          key: claude-plugins-v1

      - name: Install Claude Code plugins
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude plugin marketplace update claude-plugins-official || true
          claude plugin install rust-analyzer-lsp@claude-plugins-official --scope local || true
          claude plugin install typescript-lsp@claude-plugins-official --scope local || true
          claude plugin install github@claude-plugins-official --scope local || true
          claude plugin install code-review@claude-plugins-official --scope local || true

      - name: Determine agent configuration
        id: config
        run: |
          LABELS='${{ join(github.event.issue.labels.*.name, ',') }}'
          if echo "$LABELS" | grep -qi "large\|complex"; then
            echo "max_turns=80" >> $GITHUB_OUTPUT
            echo "max_budget=15.00" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -qi "small"; then
            echo "max_turns=25" >> $GITHUB_OUTPUT
            echo "max_budget=3.00" >> $GITHUB_OUTPUT
          else
            echo "max_turns=50" >> $GITHUB_OUTPUT
            echo "max_budget=8.00" >> $GITHUB_OUTPUT
          fi

      - name: Create branch
        run: |
          BRANCH="agent/issue-${{ github.event.issue.number }}"
          # Delete stale remote branch from previous runs (if any)
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run Claude Code (with retry)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Build structured prompt
          cat > /tmp/agent-prompt.md <<'PROMPT_DELIMITER'
          You are working on a GitHub issue for the Ganttlet project.

          ## Instructions

          1. Read CLAUDE.md for project context, architecture constraints, and behavioral rules.
          2. Identify the relevant files. If the issue lists them, start there. Otherwise, search.
          3. Write or update tests FIRST that verify the expected behavior.
          4. Implement the changes to make the tests pass.
          5. Run verification: ./scripts/full-verify.sh
          6. If verification fails, fix the issues. Do not skip tests or weaken assertions.
          7. Commit with descriptive messages using conventional commits (feat:, fix:, etc.).

          ## Scope Rules
          - ONLY modify files directly relevant to this issue.
          - Do NOT refactor unrelated code.
          - Do NOT modify CI/CD workflows, Dockerfile, or package.json unless the issue requires it.
          - If you need to change a shared file (lib.rs, types.ts), keep changes minimal.

          ## Error Handling
          - Level 1 (fixable): Read error, fix code, re-run. Up to 3 distinct approaches.
          - Level 2 (stuck): Commit WIP with message explaining what's broken.
          - Level 3 (blocked): Commit, continue with non-dependent tasks.

          ## Progress Reporting
          After each significant step, output a one-line status update so progress is visible in the CI log.
          Use this format: [PROGRESS] <what you just did or are about to do>
          Examples:
            [PROGRESS] Read 4 source files, identified cascade logic in src/utils/cascadeUtils.ts
            [PROGRESS] Added 3 test cases for slack-preserving cascade behavior
            [PROGRESS] Running ./scripts/full-verify.sh — all unit tests pass
          Report progress after: reading files, writing tests, implementing changes, running verification, and committing.

          ## When Done
          Write `.agent-summary.md` in the repo root containing:
          - What you changed and why
          - What tests you added or modified
          - What you were unable to complete (if anything) and why
          - The output of ./scripts/full-verify.sh
          PROMPT_DELIMITER

          # Prepend issue context (using env vars for security)
          {
            echo "# Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
            echo ""
            echo "## Issue Description"
            echo "${ISSUE_BODY}"
            echo ""
            echo "---"
            echo ""
            cat /tmp/agent-prompt.md
          } > /tmp/full-prompt.md

          MAX_ATTEMPTS=2
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Agent attempt ${attempt}/${MAX_ATTEMPTS} ==="

            if [[ $attempt -gt 1 ]]; then
              PREV_LOG=$(tail -80 /tmp/agent-attempt-$((attempt-1)).log 2>/dev/null || echo "(no log)")
              RECENT_COMMITS=$(git log --oneline -5 2>/dev/null || echo "(none)")
              {
                echo "NOTE: Previous attempt failed. This is attempt ${attempt}/${MAX_ATTEMPTS}."
                echo ""
                echo "Recent commits (your previous progress):"
                echo "${RECENT_COMMITS}"
                echo ""
                echo "Last output from previous attempt:"
                echo '```'
                echo "${PREV_LOG}"
                echo '```'
                echo ""
                echo "Continue from where you left off. Do not redo completed work."
                echo ""
                echo "---"
                echo ""
                cat /tmp/full-prompt.md
              } > /tmp/retry-prompt.md
              PROMPT_FILE=/tmp/retry-prompt.md
            else
              PROMPT_FILE=/tmp/full-prompt.md
            fi

            set +e
            claude -p --verbose "$(cat $PROMPT_FILE)" \
              --dangerously-skip-permissions \
              --max-turns ${{ steps.config.outputs.max_turns }} \
              --max-budget-usd ${{ steps.config.outputs.max_budget }} \
              2>&1 | tee /tmp/agent-attempt-${attempt}.log
            EXIT_CODE=${PIPESTATUS[0]}
            set -e

            if [[ $EXIT_CODE -eq 0 ]]; then
              echo "Agent succeeded on attempt ${attempt}"
              break
            fi
            echo "Attempt ${attempt} failed (exit code ${EXIT_CODE})"
          done

          # Fail the step if all attempts failed
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "All ${MAX_ATTEMPTS} attempts failed"
            cat /tmp/agent-attempt-${MAX_ATTEMPTS}.log
            exit 1
          fi

      - name: Build PR body from agent summary
        if: success()
        run: |
          if [[ -f .agent-summary.md ]]; then
            {
              echo "Closes #${{ github.event.issue.number }}"
              echo ""
              cat .agent-summary.md
            } > /tmp/pr-body.md
          else
            {
              echo "Closes #${{ github.event.issue.number }}"
              echo ""
              echo "Agent did not produce a summary. Review the diff carefully."
              echo ""
              echo "---"
              echo "*Automated by [agent-work workflow](.github/workflows/agent-work.yml)*"
            } > /tmp/pr-body.md
          fi

      - name: Push and create PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$(git log origin/main..HEAD --oneline)" ]]; then
            echo "Agent made no commits — skipping PR creation"
            gh issue comment ${{ github.event.issue.number }} \
              --body "Agent completed but made no commits. The issue may need more context or the changes may already be in place."
            exit 1
          fi
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Agent: ${{ github.event.issue.title }}" \
            --body-file /tmp/pr-body.md \
            --head "$BRANCH" \
            --base main

      - name: Review-fix loop
        if: success()
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFF_LINES=$(git diff origin/main...HEAD --stat | tail -1 | grep -oP '\d+(?= insertion)' || echo "0")
          if [[ "$DIFF_LINES" -le 10 ]]; then
            echo "PR too small for review (${DIFF_LINES} insertions). Skipping."
            exit 0
          fi

          PR_NUMBER=$(gh pr view "$BRANCH" --json number -q '.number')
          MAX_REVIEW_ITERATIONS=3
          REVIEW_STATUS="clean"
          FIXES_APPLIED=0
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Post initial status on the PR
          gh pr comment "$PR_NUMBER" --body "Review agent started: [Run #${{ github.run_id }}](${RUN_URL})"

          for iteration in $(seq 1 $MAX_REVIEW_ITERATIONS); do
            echo "=== Review iteration ${iteration}/${MAX_REVIEW_ITERATIONS} ==="
            gh pr comment "$PR_NUMBER" --body "Review iteration ${iteration}/${MAX_REVIEW_ITERATIONS}: running code review..."

            # Run code review and capture output
            set +e
            REVIEW_OUTPUT=$(claude -p --verbose "Use /code-review to review PR #${PR_NUMBER}. After posting your review comment, output EXACTLY one of these lines at the end: REVIEW_RESULT:CLEAN (if no issues found or no comment posted) or REVIEW_RESULT:ISSUES_FOUND (if you posted a review comment with issues)." \
              --dangerously-skip-permissions \
              --max-turns 30 \
              --max-budget-usd 5.00 2>&1)
            REVIEW_EXIT=$?
            set -e

            echo "$REVIEW_OUTPUT"

            if [[ $REVIEW_EXIT -ne 0 ]]; then
              echo "Review agent failed (exit $REVIEW_EXIT). Skipping review loop."
              REVIEW_STATUS="error"
              break
            fi

            # Check if issues were found
            if echo "$REVIEW_OUTPUT" | grep -q "REVIEW_RESULT:CLEAN"; then
              echo "Review clean on iteration ${iteration}. Done."
              REVIEW_STATUS="clean"
              break
            fi

            if ! echo "$REVIEW_OUTPUT" | grep -q "REVIEW_RESULT:ISSUES_FOUND"; then
              echo "Could not determine review result. Assuming clean."
              REVIEW_STATUS="clean"
              break
            fi

            # Issues found — if we have iterations left, fix them
            if [[ $iteration -eq $MAX_REVIEW_ITERATIONS ]]; then
              echo "Max review iterations reached. Remaining issues left for human review."
              REVIEW_STATUS="issues_remaining"
              break
            fi

            gh pr comment "$PR_NUMBER" --body "Review iteration ${iteration}: issues found. Running fix agent..."

            # Get the latest review comment
            REVIEW_COMMENT=$(gh pr view "$PR_NUMBER" --json comments --jq '.comments | map(select(.body | test("Code review"))) | last | .body' 2>/dev/null || echo "")

            if [[ -z "$REVIEW_COMMENT" ]]; then
              echo "Could not retrieve review comment. Skipping fix."
              REVIEW_STATUS="error"
              break
            fi

            # Run fix agent
            set +e
            claude -p --verbose "You are fixing code review findings for PR #${PR_NUMBER} on the Ganttlet project.

          Read CLAUDE.md first for project context.

          The code review found these issues:

          ${REVIEW_COMMENT}

          Fix ALL the issues listed above. For each issue:
          1. Read the referenced file(s)
          2. Understand the problem
          3. Make the fix
          4. Commit with: fix: <description of what was fixed>

          After fixing, run ./scripts/full-verify.sh to make sure nothing is broken.
          Do NOT modify files unrelated to the review findings." \
              --dangerously-skip-permissions \
              --max-turns ${{ steps.config.outputs.max_turns }} \
              --max-budget-usd ${{ steps.config.outputs.max_budget }} 2>&1 | tee /tmp/fix-attempt-${iteration}.log
            FIX_EXIT=${PIPESTATUS[0]}
            set -e

            if [[ $FIX_EXIT -ne 0 ]]; then
              echo "Fix agent failed (exit $FIX_EXIT). Leaving issues for human review."
              REVIEW_STATUS="issues_remaining"
              break
            fi

            FIXES_APPLIED=$((FIXES_APPLIED + 1))

            # Push fixes
            if [[ -n "$(git status --porcelain)" ]]; then
              git add -A
              git commit -m "fix: address code review findings (iteration ${iteration})" || true
            fi
            git push origin "$BRANCH"

            gh pr comment "$PR_NUMBER" --body "Review iteration ${iteration}: fixes pushed. Re-reviewing..."
          done

          # Post final review summary on the PR
          if [[ "$REVIEW_STATUS" == "clean" && $FIXES_APPLIED -eq 0 ]]; then
            SUMMARY="Automated code review passed — no issues found."
          elif [[ "$REVIEW_STATUS" == "clean" && $FIXES_APPLIED -gt 0 ]]; then
            SUMMARY="Automated code review complete. Fixed issues in ${FIXES_APPLIED} iteration(s). Final review is clean."
          elif [[ "$REVIEW_STATUS" == "issues_remaining" ]]; then
            SUMMARY="Automated code review complete. Fix agent attempted ${FIXES_APPLIED} fix(es) but some issues remain. Please review manually."
          else
            SUMMARY="Automated code review encountered an error. Please review manually."
          fi

          gh pr comment "$PR_NUMBER" --body "$(printf "### Review Summary\n\n%s\n\n[View workflow run](%s)" "$SUMMARY" "$RUN_URL")"

      - name: Comment on issue (success)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr view "$BRANCH" --json url -q '.url')
          gh issue comment ${{ github.event.issue.number }} \
            --body "Agent has created a PR: ${PR_URL}"

      - name: Comment on issue (failure)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Agent workflow failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
