# Phase 16: Date Calculation Bug Fixes — Inclusive Convention
# Fixes 14 bugs across Rust scheduler, TS state, UI rendering, and CRDT sync.
# See docs/plans/date-calc-fixes.md for full analysis and verification.

phase: 16
status: pending
context: >
  The codebase uses an exclusive end-date convention (end_date = day after last working day)
  but the intended convention is inclusive (end_date = last working day). This causes off-by-one
  errors in duration calculation (14 callsites), cascade FS overlap, constraint derivation,
  conflict detection, bar rendering, and CRDT sync. See docs/plans/date-calc-fixes.md for the
  complete bug inventory (Bugs 1-15), verified formulas, and function naming glossary.

  Key convention: end_date is INCLUSIVE, duration = business days in [start, end] counting both.
  Formula: end = addBusinessDays(start, duration - 1). Inverse: duration = taskDuration(start, end).

