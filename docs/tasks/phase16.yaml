            status: pending
          - id: B2
            summary: "Add taskDuration(start, end) — counts [start,end] inclusive business days. Same-day = 1."
            status: pending
            exit_criteria: >
              taskDuration('2026-03-11', '2026-03-24') returns 10.
              taskDuration('2026-03-02', '2026-03-02') returns 1.
              taskDuration('2026-03-06', '2026-03-10') returns 3 (Fri, Mon, Tue).
          - id: B3
            summary: "Add taskEndDate(start, duration) — returns addBusinessDays(start, duration - 1)"
            status: pending
            exit_criteria: >
              taskEndDate('2026-03-02', 5) returns '2026-03-06' (Fri).
              taskEndDate('2026-03-02', 1) returns '2026-03-02' (same day).
              taskDuration(start, taskEndDate(start, dur)) === dur for all test cases.
          - id: B4
