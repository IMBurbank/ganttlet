pr:
  title: "fix: inclusive end-date convention — 14 bug fixes across scheduler, state, UI, sync"
  summary: |
    Switches end_date convention from exclusive to inclusive across the entire codebase.

    Changes:
    1. Convention-encoding functions: taskDuration, taskEndDate (TS+Rust)
    2. Rust scheduler: cascade FS fix, constraints FNET/FNLT/MFO, find_conflicts FF/SF
    3. TS state: 14 workingDaysBetween→taskDuration migrations, ADD_TASK weekend snap
    4. UI: bar width +colWidth, drag weekend snap, dateToX rename, validation
    5. Sync: sheetsMapper + yjsBinding migration, UPDATE_TASK_FIELD duration sync
    6. Structural tests: cascade/recalculate agreement, cross-language consistency
    7. Cleanup: delete deprecated functions, pre-commit hook enforcement

    See docs/plans/date-calc-fixes.md for full bug inventory and verification.
  test_plan: |
    - [ ] `cargo test` — all Rust tests pass with inclusive convention
    - [ ] `npm run test` — all Vitest tests pass
    - [ ] `npx tsc --noEmit` — no type errors
    - [ ] Cascade/recalculate agreement tests pass for FS/SS/FF/SF with lag 0,1,2
    - [ ] Cross-language consistency: TS taskDuration/taskEndDate match Rust via WASM
    - [ ] No `workingDaysBetween` callers remain (grep verification)
    - [ ] No `next_biz_day_on_or_after` callers remain (grep verification)
    - [ ] Bar width visually correct for 1-day, 5-day, weekend-crossing tasks
    - [ ] Weekend dates rejected in inline edit, popover edit, drag
