# Phase 16c: Convention Hardening & Agent Guardrails
# Fix systemic gaps discovered during Phase 16 code review that caused
# repeated mistakes: scattered validation, drifting docs, missing callsite
# discipline, inconsistent test data, and duplicated pixel math.
#
# Scope: guardrails only — no new features, no type system changes (see 16b).

phase: 16c
status: pending
context: >
  Phase 16 (inclusive end-date convention) went through 5 code review rounds
  before passing clean. Analysis of the mistakes revealed 5 systemic gaps:

  1. Input validation is scattered across 4 UI components with inconsistent
     guards. `validateStartDate` exists (with 5 tests) but is never wired to
     any UI component. TaskBarPopover uses raw <input type="date"> with no
     validation at all. sheetsMapper (system boundary) has no date validation.

  2. rust-scheduler.md drifts from source — wrong function names (is_weekend
     vs is_weekend_date, find_conflicts vs detect_conflicts), stale historical
     notes, missing functions (add_days, shift_date), implementation-level
     descriptions instead of semantic contracts. Root cause: it's a manual
     copy of info that already exists in doc comments.

  3. No rule tells agents to find all callsites before fixing a pattern bug.
     Phase 16 required 5 commits for workingDaysBetween migration, 2 for FS
     formula, 3 for constraint formulas — all should have been 1 each.

  4. Test helpers (make_task) accept weekend dates and inconsistent durations.
     ~35 callsites use weekend dates (excl. CPM), ~33 have duration/date
     mismatches in constraints.rs.

  5. dayPx (pixel-per-day at zoom level) is computed identically in 3 files
     with no shared utility.

  Design principles:
  - Fix gaps with minimal code changes — guardrails, not rewrites
  - Make the source the single source of truth for docs (LSP over .md copies)
  - Validate at system boundaries (Sheets import) and UI entry points
  - Test helpers should enforce the same invariants as production code

  Evidence base:
  - Phase 16 PR #54: 5 review rounds, 11 issues fixed
  - workingDaysBetween migration: 5 commits across 5 files (should be 1)
  - TaskRow < 0 guard missed after fixing TaskBarPopover (found in round 4)
  - ALAP test used Sunday end date (2026-03-22), passed because untested
  - rust-scheduler.md said business_day_delta was "signed" (it returns 0)
  - rust-scheduler.md listed is_weekend() but public API is is_weekend_date()

stages:
  - name: "Stage 1 — Group A: CLAUDE.md Callsite Rule + Module Docs"
    description: >
      Add the LSP-first callsite rule to CLAUDE.md and add //! module-level
      doc blocks to the 5 undocumented Rust modules. Convert rust-scheduler.md
      from a manual function reference to a pointer that directs agents to use
      LSP hover/documentSymbol on the source.
    tasks:
      - id: A1
        summary: "Add callsite-search rule to CLAUDE.md"
        description: >
          Add to Agent Behavioral Rules: "When fixing a pattern bug, use LSP
          findReferences on the affected symbol to find all code callsites
          before committing. Fix all callsites atomically. Then grep for the
          same pattern in comments, docs, prompts, and cross-language boundaries
          where LSP cannot reach."
        files: [CLAUDE.md]
        tests: none
        complexity: trivial

      - id: A2
        summary: "Add //! module docs to date_utils, cascade, constraints, graph, types"
        description: >
          Add //! doc blocks to the 5 modules that lack them. cpm.rs already
          has an excellent //! block as a model. Each should explain:
          - Module purpose and key abstractions
          - date_utils.rs: inclusive convention, shift_date as pub(crate)
            primitive, which functions are the public API
          - cascade.rs: cascade algorithm, duration preservation
          - constraints.rs: constraint types, recalculate_earliest flow
          - graph.rs: cycle detection
          - types.rs: core data structures
          cargo doc currently succeeds with zero warnings — adding //! blocks
          cannot introduce warnings, but verify post-change.
        files:
          - crates/scheduler/src/date_utils.rs
          - crates/scheduler/src/cascade.rs
          - crates/scheduler/src/constraints.rs
          - crates/scheduler/src/graph.rs
          - crates/scheduler/src/types.rs
        tests: "cargo doc --no-deps (must succeed with no warnings)"
        complexity: small

      - id: A3
        summary: "Convert rust-scheduler.md from copy to pointer"
        description: >
          Replace the Date Convention Functions section in rust-scheduler.md
          with a directive to use LSP hover and documentSymbol on date_utils.rs.
          Fix the module map:
          - is_weekend → is_weekend_date (is_weekend is private)
          - find_conflicts → detect_conflicts (the actual #[wasm_bindgen] export)
          - add add_days (pub fn, calendar-day shift, currently missing)
          - add shift_date to Date Convention section with pub(crate) warning
          Remove stale historical notes (replaces next_biz_day_on_or_after).
          Keep the high-level crate overview and behavioral guidance.
        files: [.claude/agents/rust-scheduler.md]
        tests: none
        complexity: small

      - id: A4
        summary: "Add crate-level //! doc block to lib.rs"
        description: >
          Add //! to lib.rs describing the WASM scheduling engine, its 7
          #[wasm_bindgen] exports (compute_critical_path, compute_critical_path_scoped,
          would_create_cycle, compute_earliest_start, cascade_dependents,
          detect_conflicts, recalculate_earliest), and the inclusive end-date
          convention. Note: the internal helper is find_conflicts(); the WASM
          export wrapping it is detect_conflicts(). This is what cargo doc
          shows on the crate index page.
        files: [crates/scheduler/src/lib.rs]
        tests: "cargo doc --no-deps"
        complexity: trivial

  - name: "Stage 1 — Group B: Input Validation Consolidation"
    description: >
      Wire up existing validators, add missing validation at system boundaries,
      and ensure all UI entry points use shared utilities consistently.
    tasks:
      - id: B1
        summary: "Wire validateStartDate to TaskRow InlineEdit"
        description: >
          TaskRow startDate InlineEdit (line ~201) has no validate prop.
          validateStartDate exists in taskFieldValidation.ts and has 5 passing
          tests — it is tested but never wired to any UI component.
          Wire it: validate={(v) => validateStartDate(v, task.endDate)}.
          Must add validateStartDate to the import statement in TaskRow.tsx
          (currently imports validateTaskName, validateDuration, validateEndDate
          but NOT validateStartDate).
        files: [src/components/table/TaskRow.tsx]
        tests: >
          validateStartDate already has 5 tests in taskFieldValidation.test.ts
          (lines 75-99). No new unit tests needed for the function itself.
          Verify existing tests still pass after wiring. Add E2E test
          verifying weekend startDate rejection in the table edit flow.
        complexity: trivial

      - id: B2
        summary: "Add imperative validation to TaskBarPopover"
        description: >
          TaskBarPopover uses raw <input type="date"> elements (lines 159-180),
          NOT InlineEdit components — there is no validate prop available.
          Must add imperative validation inside saveField() or onChange handlers
          with local error state. Three inputs need validation:
          1. startDate input: no weekend check, no guard at all
          2. endDate input: has newDuration < 1 guard but silently drops —
             should show error feedback
          3. constraintDate input (lines 226-238): no weekend check
          Use validateStartDate, validateEndDate from taskFieldValidation.ts
          for the logic, but display errors via local state (e.g., useState
          for error message) since raw inputs don't support validate prop.
        files: [src/components/gantt/TaskBarPopover.tsx]
        tests: >
          Add E2E test verifying weekend date rejection in the popover edit
          flow (startDate, endDate, constraintDate). Verify weekend input
          shows error feedback rather than silently dropping.
        complexity: small

      - id: B3
        summary: "Add validation to sheetsMapper rowToTask"
        description: >
          sheetsMapper.ts rowToTask parses external Sheets data with no
          validation — a system boundary that CLAUDE.md says must validate.
          Add: weekend date snapping (ensureBusinessDay/prevBusinessDay),
          duration >= 1 guard, endDate >= startDate guard. Log warnings
          for corrected values.
          Also: parseConstraintFields (lines 102-122) accepts any string for
          constraintDate without weekend checking — add ensureBusinessDay
          there too.
        files: [src/sheets/sheetsMapper.ts, src/sheets/__tests__/sheetsMapper.test.ts]
        tests: "Add sheetsMapper test for invalid input handling"
        complexity: small

  - name: "Stage 2 — Group C: Test Data Cleanup (after stage 1)"
    description: >
      Add validation to test helpers and fix existing invalid test data.
      This is the largest group — ~35 weekend dates (excl. CPM) and ~33
      duration/date mismatches in constraints.rs.
    tasks:
      - id: C1
        summary: "Add debug_assert to cascade.rs make_task and fix weekend dates"
        description: >
          Add debug_assert!(!is_weekend_date(start)), debug_assert!(!is_weekend_date(end))
          to cascade.rs make_task. Also add duration consistency check:
          cascade_dependents() reads dependent.duration for FF and SF dep
          types (lines 102, 105 — passed to ff_successor_start and
          sf_successor_start). The hardcoded duration=7 affects FF/SF test
          correctness. Add debug_assert!(task_duration(start, end) == 7)
          so the end date must be consistent with the hardcoded duration.
          Tests that override t.duration must also override end to match.

          Weekend dates to fix (~18 occurrences across 5 distinct dates):
          - 2026-03-01 (Sun) → 2026-03-02 (Mon): 12 callsites as start date
          - 2026-03-07 (Sat): 1 callsite as end date
          - 2026-03-15 (Sun): 2 callsites as end date
          - 2026-03-21 (Sat): 2 callsites as start date
          - 2026-03-28 (Sat): 1 callsite as end date

          CRITICAL: cascade.rs make_task hardcodes duration=7. When changing
          a start date, derive the corresponding end date as
          task_end_date(new_start, 7) — do NOT just shift the start and keep
          the old end. When a test overrides t.duration, the end date must
          also be recomputed as task_end_date(start, new_duration).
          Use node -e or python3 -c for ALL date computations.
          Every downstream assertion must be recomputed from scratch.
        files: [crates/scheduler/src/cascade.rs]
        tests: "cargo test — all 121 must pass after date corrections"
        complexity: medium

      - id: C2
        summary: "Add debug_assert to constraints.rs make_task and fix mismatches"
        description: >
          Add debug_assert for weekend dates AND duration consistency to
          constraints.rs make_task (which takes explicit duration parameter):
          debug_assert!(task_duration(start, end) == duration).
          Also add asserts to make_task_with_project (it already has
          correct duration/date pairs, but add weekend guards).

          ~33 duration/date mismatches (all from make_task; make_task_with_project
          has 0 mismatches — its duration=5 with Mon-Fri windows is correct).
          Many use duration=10 with date windows containing weekends
          (actual biz days ~7-8). This matters because
          constraints.rs production code reads task.duration in 7 places.

          CPM exception: cpm.rs make_task should NOT add these asserts
          (CPM uses exclusive integer model, milestones have duration=0,
          and CPM production code ignores start_date/end_date entirely).
        files: [crates/scheduler/src/constraints.rs]
        tests: "cargo test — all must pass"
        complexity: medium

      - id: C3
        summary: "Fix weekend dates in lib.rs and graph.rs test helpers"
        description: >
          lib.rs make_task hardcodes duration=7 (same as cascade.rs).
          lib.rs has no weekend dates currently — all test dates are weekdays.
          Still add debug_assert for weekends as a guardrail.
          graph.rs make_task is 1-arg (takes only id) — all dates hardcoded
          in body: start=2026-03-01 (Sunday), end=2026-03-10 (Tuesday).
          Only graph.rs needs date fixes (start 2026-03-01 → 2026-03-02).
          Add debug_assert for weekends to both helpers.
        files:
          - crates/scheduler/src/lib.rs
          - crates/scheduler/src/graph.rs
        tests: "cargo test"
        complexity: small

  - name: "Stage 1 — Group D: Extract getDayPx Utility"
    description: >
      Extract the duplicated zoom-to-pixel-per-day formula into a shared
      utility function.
    tasks:
      - id: D1
        summary: "Add getDayPx to dateUtils.ts and replace 3 callsites"
        description: >
          Add getDayPx(zoom: ZoomLevel): number to dateUtils.ts. Call
          getColumnWidth(zoom) internally — no colWidth parameter needed
          since callers always derive colWidth from getColumnWidth(zoom)
          anyway. Implementation:
            return getColumnWidth(zoom) / (zoom === 'day' ? 1 : zoom === 'week' ? 7 : 30)
          Replace the identical ternary in GanttChart.tsx:128, TaskBar.tsx:103,
          and dependencyUtils.ts:28. Also fix TodayLine.tsx to call
          getColumnWidth instead of duplicating its logic inline (line 14).
        files:
          - src/utils/dateUtils.ts
          - src/utils/__tests__/dateUtils.test.ts
          - src/components/gantt/GanttChart.tsx
          - src/components/gantt/TaskBar.tsx
          - src/components/gantt/TodayLine.tsx
          - src/utils/dependencyUtils.ts
        tests: >
          Add unit test for getDayPx in dateUtils.test.ts (alongside existing
          getColumnWidth tests): getDayPx('day')===36, getDayPx('week')===100/7,
          getDayPx('month')===180/30.
        complexity: small

verification:
