            status: pending
          - id: A6
            summary: "Update src/CLAUDE.md — add convention exception for taskDuration/taskEndDate over raw date-fns"
            status: pending
          - id: A7
            summary: "Update .claude/skills/scheduling-engine/SKILL.md — add Known Gotchas and Lessons Learned entries"
            status: pending
          - id: A8
