phase: phase17-datecalc
merge_target: feature/phase17-datecalc
base_branch: plan/datecalc-tool

# All work happens in worktrees branched from base_branch.
# /workspace MUST stay on main — it is the shared base for all worktrees.
# Agents are launched with --cwd pointing to their worktree directory.

stages:
  - name: "Stage 1: Implementation"
    groups:
      - id: groupA
        branch: feature/17-lint-shell-docs
        merge_message: "Merge feature/17-lint-shell-docs: shell functions, CLAUDE.md updates"
      - id: groupB
        branch: feature/17-bizday-binary
        merge_message: "Merge feature/17-bizday-binary: Rust bizday crate with compute, verify, log, report"
      - id: groupC
        branch: feature/17-hook-validation
        merge_message: "Merge feature/17-hook-validation: PostToolUse hook registration, validation prompts"

  - name: "Stage 2: Validation"
    groups:
      - id: groupV
        branch: feature/17-validation-results
        merge_message: "Merge feature/17-validation-results: Agent validation findings and plan updates"

pr:
  title: "feat: bizday date math safety — passive hook + convention CLI + measurement"
  summary: |
    ## Summary
    - Rust `bizday` binary: convention-aware date CLI (inclusive duration only)
    - Shell function aliases: `taskEndDate`, `task_end_date`, `taskDuration`, `task_duration`
    - PostToolUse hook: verifies date literals in agent-written code (~3ms per edit)
    - Structural guards: `shift_date` is `pub(crate)`, `addBusinessDays` not exported
    - Measurement framework: `bizday report --trend`, `--eval` with checkpoint prompts
    - Property-based tests: 6 properties × 10,000 CI cases verifying date_utils invariants
    - Validated with 6 agent sessions (3 medium, 3 large date-heavy tasks)

    Plan: docs/plans/datecalc-tool.md
  test_plan: |
    - [ ] `cargo test -p bizday` — all unit + proptest + integration tests pass
    - [ ] `./scripts/full-verify.sh` — no regressions
    - [ ] Shell functions work: `taskEndDate 2026-03-11 10` returns `2026-03-24`
    - [ ] PostToolUse hook fires on Edit/Write and logs to `.claude/logs/bizday.log`
    - [ ] `bizday report --trend` shows validation session data
    - [ ] Validation results documented in plan
