name: PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    # Skip draft PRs. Agent PRs get initial review from agent-work.yml,
    # but this catches subsequent pushes (e.g. after fixing review findings).
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Check PR size
        id: pr-size
        run: |
          DIFF_LINES=$(git diff origin/main...HEAD --stat | tail -1 | grep -oP '\d+(?= insertion)' || echo "0")
          echo "lines=${DIFF_LINES}" >> $GITHUB_OUTPUT

      - name: Run code review
        if: steps.pr-size.outputs.lines > 10
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude -p "Use /code-review to review PR #${{ github.event.pull_request.number }}" \
            --dangerously-skip-permissions \
            --max-turns 30 \
            --max-budget-usd 5.00 || true
