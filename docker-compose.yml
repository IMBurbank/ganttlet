services:
  dev:
    build: .
    volumes:
      - .:/workspace                          # Project files (two-way sync with host)
      - ~/.gitconfig:/home/node/.gitconfig:ro    # Share your git identity with the container
      - ~/.ssh:/home/node/.ssh:ro                # Share SSH keys for GitHub push/pull
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_CLI_FLAGS=${CLAUDE_CLI_FLAGS}
    stdin_open: true
    tty: true
    ports:
      - "5173-5183:5173-5183"   # Vite dev servers (range for multiple sessions)
      - "3000-3010:3000-3010"   # Backend API servers (range for multiple sessions)

  relay:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "4000:4000"
    environment:
      - RELAY_HOST=0.0.0.0
      - RELAY_PORT=4000
      - RELAY_ALLOWED_ORIGINS=http://localhost:5173
      - RUST_LOG=info
