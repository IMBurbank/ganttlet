# Phase 18: Onboarding UX — State Machine, Welcome Flows & Sheet Management
# Source: docs/proposals/designs/design-{1..6}.md
# PRD: docs/proposals/onboarding-prd.md
# Prerequisite: Issue #62 (write range fix)

phase: 18
status: pending
context: >
  Implement the complete onboarding experience: dataSource state machine,
  WelcomeGate routing, sandbox mode, sheet selector, welcome screens, empty state,
  sandbox promotion, templates, sheet management, error handling, and header
  validation UI. Covers all 53 PRD requirements across 6 designs.

stages:
  - name: "Stage 1: State Machine + WelcomeGate + Fake Data Decoupling (single agent)"
    description: >
      Foundation layer. Adds dataSource/syncError/sandboxDirty to GanttState,
      gates auto-save and Yjs, moves fakeData to templates, creates WelcomeGate
      routing shell, adds header validation and error classification.
    groups:
      - id: A
        name: "Design 1 — State Machine + WelcomeGate + Fake Data Decoupling"
        depends_on: []
        scope:
          modify:
            - src/types/index.ts
            - src/state/actions.ts
            - src/state/ganttReducer.ts
            - src/state/GanttContext.tsx
            - src/data/fakeData.ts              # Move → src/data/templates/softwareRelease.ts
            - src/sheets/sheetsSync.ts
            - src/sheets/sheetsMapper.ts
            - src/App.tsx
          create:
            - src/data/defaultColumns.ts
            - src/data/templates/softwareRelease.ts
            - src/sheets/syncErrors.ts
            - src/components/onboarding/WelcomeGate.tsx
          test:
            - src/state/__tests__/dataSource.test.ts
            - src/sheets/__tests__/syncErrors.test.ts
            - src/sheets/__tests__/headerValidation.test.ts
            - src/components/__tests__/WelcomeGate.test.tsx
          read_only:
            - src/sheets/sheetsClient.ts
            - src/sheets/oauth.ts
        tasks:
          - id: A1
            summary: "Read types.ts, actions.ts, ganttReducer.ts, GanttContext.tsx, fakeData.ts — understand current state model"
            status: pending
          - id: A2
            summary: "Add DataSource, SyncError types to types/index.ts; add dataSource, syncError, sandboxDirty to GanttState"
            status: pending
            exit_criteria: >
              DataSource = 'sandbox' | 'loading' | 'sheet' | 'empty'.
              SyncError.type includes auth, not_found, forbidden, rate_limit, network, header_mismatch.
              GanttState has dataSource (DataSource|undefined), syncError (SyncError|null), sandboxDirty (boolean).
          - id: A3
            summary: "Add SET_DATA_SOURCE, SET_SYNC_ERROR, ENTER_SANDBOX, RESET_STATE actions; move TASK_MODIFYING_ACTIONS to actions.ts"
            status: pending
            exit_criteria: >
              4 new action types: SET_DATA_SOURCE, SET_SYNC_ERROR, ENTER_SANDBOX, RESET_STATE.
              TASK_MODIFYING_ACTIONS exported from actions.ts (moved from GanttContext.tsx)
              so reducer can import it.
          - id: A4
            summary: "Add 4 reducer cases + sandboxDirty auto-tracking + empty→sheet auto-transition"
            status: pending
            exit_criteria: >
              SET_DATA_SOURCE, SET_SYNC_ERROR, ENTER_SANDBOX, RESET_STATE all handled.
              RESET_STATE returns { ...initialState } (dataSource: undefined).
              Post-processing: sandbox + TASK_MODIFYING → sandboxDirty=true.
              Post-processing: empty + TASK_MODIFYING → dataSource='sheet'.
              Unit tests pass in dataSource.test.ts.
          - id: A5
            summary: "Move fakeData.ts → src/data/templates/softwareRelease.ts; create src/data/defaultColumns.ts"
            status: pending
            exit_criteria: >
              fakeData.ts deleted. softwareRelease.ts exports fakeTasks and fakeChangeHistory.
              defaultColumns.ts exports defaultColumns. All existing imports updated.
              softwareRelease.ts is NOT imported at app startup — only lazily via ENTER_SANDBOX.
          - id: A6
            summary: "Create syncErrors.ts with classifySyncError; add validateHeaders to sheetsMapper.ts"
            status: pending
            exit_criteria: >
              classifySyncError maps: 401→auth, 403→forbidden, 404→not_found, 429→rate_limit,
              TypeError→network, default Response→network with HTTP status in message.
              validateHeaders checks 20 SHEET_COLUMNS, case-insensitive, order-sensitive.
              Both have passing unit tests.
          - id: A7
            summary: "Update GanttContext: empty initialState, dataSource gating, sheet-loading orchestration, beforeunload"
            status: pending
            exit_criteria: >
              initialState.tasks=[], dataSource=undefined. Auto-save guard: dataSource !== 'sheet'.
              Yjs guard: dataSource !== 'sheet' (additive to existing ?room= + token checks).
              collabDispatch guard after dispatch() before Yjs sync block.
              Sheets sync useEffect: runs when ?sheet= + signed in. Sets dataSource='loading',
              calls loadFromSheet(). Success+data → 'sheet'. Success+[] → 'empty'. Throw →
              syncError via classifySyncError (dataSource stays 'loading').
              Sign-in during sandbox: dataSource stays 'sandbox', no Yjs opens.
              beforeunload when sandbox + sandboxDirty=true. No beforeunload when sandboxDirty=false.
          - id: A8
            summary: "Change loadFromSheet to throw on HTTP errors; export stopPolling()"
            status: pending
            exit_criteria: >
              loadFromSheet throws Response on HTTP errors instead of returning [].
              Early-return for unauthenticated state removed (caller checks auth).
              stopPolling() exported for disconnect/error flows.
          - id: A9
            summary: "Create WelcomeGate.tsx routing shell; wrap AppContent in App.tsx"
            status: pending
            exit_criteria: >
              WelcomeGate: dataSource defined → render children (GanttApp).
              dataSource undefined + ?sheet= or ?room= → render nothing (useEffect handles loading).
              dataSource undefined + no URL params → placeholder with "Try the demo" → ENTER_SANDBOX.
              App.tsx wraps AppContent with WelcomeGate inside GanttProvider.
              Design 3 will replace the placeholder with real screen routing (D6).
          - id: A10
            summary: "Update makeState() in existing reducer tests for new GanttState fields"
            status: pending
            exit_criteria: "All existing tests in ganttReducer.test.ts pass with updated makeState helper."

  - name: "Stage 2: Sheet Selector + Error Handling (parallel — 2 agents)"
    description: >
      Two agents work in parallel. Group B builds the sheet selector modal (all
      new files). Group C builds error UI, polling backoff, and offline detection.
      No file overlap. Both depend only on A. C imports removeRecentSheet from
      recentSheets.ts (created by B) — this works because both B and C merge
      into the same stage branch, and C's import resolves at merge time.
    groups:
      - id: B
        name: "Design 2 — Sheet Selector + Recent Sheets List"
        depends_on: [A]
        scope:
          create:
            - src/components/onboarding/SheetSelector.tsx
            - src/sheets/sheetsBrowser.ts
            - src/utils/recentSheets.ts
            - src/utils/parseSheetUrl.ts
          test:
            - src/utils/__tests__/parseSheetUrl.test.ts
            - src/utils/__tests__/recentSheets.test.ts
            - src/components/onboarding/__tests__/SheetSelector.test.tsx
          read_only:
            - src/sheets/oauth.ts
            - src/types/index.ts
            - src/state/actions.ts
        tasks:
          - id: B1
            summary: "Read oauth.ts to understand token access pattern; read types/index.ts for DataSource"
            status: pending
          - id: B2
            summary: "Create parseSheetUrl.ts — extract spreadsheet ID from Google Sheets URLs"
            status: pending
            exit_criteria: >
              Regex extracts ID from valid URLs. Returns null for invalid URLs.
              Unit tests cover: standard URL, URL with gid, URL with /edit, non-Sheets URL, bare ID.
          - id: B3
            summary: "Create recentSheets.ts — localStorage CRUD with LRU eviction (max 10)"
            status: pending
            exit_criteria: >
              getRecentSheets, addRecentSheet, removeRecentSheet exported.
              LRU eviction when >10 entries. Unit tests cover add, evict, remove, empty state.
          - id: B4
            summary: "Create sheetsBrowser.ts — listUserSheets(token) using Drive API v3"
            status: pending
            exit_criteria: >
              SheetInfo interface exported (id, name, modifiedTime, iconLink).
              Query filters: mimeType='application/vnd.google-apps.spreadsheet', trashed=false.
              Fetches up to 20 spreadsheets sorted by modifiedTime desc.
              Uses fetch + Bearer token, no Google SDK.
          - id: B5
            summary: "Create SheetSelector.tsx modal — Drive listing + URL paste + connect flow"
            status: pending
            exit_criteria: >
              Modal shows Drive listing top, URL paste bottom. Invalid URL shows inline error:
              "Couldn't find a spreadsheet ID in this URL". [Connect] disabled when no valid selection.
              [Create New Sheet] button rendered (stub, no-op until Design 5 wires it).
              onSelectSheet(sheetId) callback sets ?sheet=ID&room=ID, dispatches SET_DATA_SOURCE('loading'),
              calls addRecentSheet(). Component test covers render, select, paste valid, paste invalid.

      - id: C
        name: "Design 6 — Error Handling + Header Validation UI"
        depends_on: [A]
        scope:
          modify:
            - src/sheets/sheetsSync.ts
            - src/sheets/sheetsClient.ts
            - src/state/GanttContext.tsx
            - src/components/layout/Header.tsx
          create:
            - src/components/onboarding/ErrorBanner.tsx
            - src/components/onboarding/SyncStatus.tsx
            - src/components/onboarding/HeaderMismatchError.tsx
          delete:
            - src/components/panels/SyncStatusIndicator.tsx
          test:
            - src/components/onboarding/__tests__/ErrorBanner.test.tsx
            - src/components/onboarding/__tests__/SyncStatus.test.tsx
            - src/components/onboarding/__tests__/HeaderMismatchError.test.tsx
            - src/sheets/__tests__/pollingBackoff.test.ts
            - src/sheets/__tests__/syncErrorRecovery.test.ts
          read_only:
            - src/types/index.ts
            - src/sheets/syncErrors.ts
            - src/sheets/sheetsMapper.ts
            - src/utils/recentSheets.ts
        tasks:
          - id: C1
            summary: "Read sheetsSync.ts, sheetsClient.ts, GanttContext.tsx, Header.tsx after Stage 1 merge"
            status: pending
          - id: C2
            summary: "Replace setInterval polling with recursive setTimeout; add backoff logic; add hard-stop for not_found/forbidden"
            status: pending
            exit_criteria: >
              startPolling uses setTimeout loop. consecutiveErrors tracked.
              When consecutiveErrors >= 3: interval doubles (max 300s). On success: reset to 30s.
              For not_found/forbidden errors: clear setTimeout handle, do NOT reschedule (hard stop).
              syncError set once per error sequence, not per retry attempt.
              Unit tests cover backoff progression, reset, and hard-stop on 404.
          - id: C3
            summary: "Add HTTP status discrimination to sheetsClient.ts retry exhaustion"
            status: pending
            exit_criteria: "On retry exhaustion, throw the Response object so classifySyncError can discriminate."
          - id: C4
            summary: "Add online/offline event listeners to GanttContext.tsx"
            status: pending
            exit_criteria: >
              useEffect registers online/offline handlers. Offline → SET_SYNC_ERROR network.
              Online → clear syncError + trigger immediate sync. Cleanup on unmount.
          - id: C5
            summary: "Create ErrorBanner.tsx — persistent banners per syncError.type"
            status: pending
            exit_criteria: >
              auth: "Session expired. [Re-authorize] to keep syncing." → signIn().
              On re-auth success: clear syncError + call scheduleSave(state.tasks).
              not_found: "Can't access this sheet. It may have been deleted." + [Open another sheet].
              Calls stopPolling() + removeRecentSheet(sheetId).
              forbidden: same banner text + [Open another sheet] (no removeRecentSheet).
              When dataSource='loading' + error: also show [Retry] button (re-calls loadFromSheet).
              network: "You're offline. Changes saved locally."
              rate_limit: NOT a banner — handled by SyncStatus (C6).
              Component test covers each error type rendering + action triggers.
          - id: C6
            summary: "Create SyncStatus.tsx — replace SyncStatusIndicator; add rate_limit display"
            status: pending
            exit_criteria: >
              Replaces SyncStatusIndicator. Shows "Synced", "Syncing...", or
              "Sync paused — retrying" for rate_limit. SyncStatusIndicator.tsx deleted.
              All existing imports updated (Header.tsx is the primary consumer).
              Component test covers all three display states.
          - id: C7
            summary: "Create HeaderMismatchError.tsx — expected vs found columns + CSV download"
            status: pending
            exit_criteria: >
              Shows expected vs found columns side by side. [Create a new sheet instead].
              [Download header template] generates CSV with all 20 SHEET_COLUMNS as row 1.
          - id: C8
            summary: "Integrate ErrorBanner + SyncStatus into Header.tsx"
            status: pending
            exit_criteria: >
              ErrorBanner renders above main content when syncError is set.
              SyncStatus replaces old SyncStatusIndicator in the header.
              Note: Design 5 (Group F, Stage 4) will further modify Header.tsx to add
              sheet title, share button, and dropdown. C8's changes should be additive
              (banner + status indicator) to avoid conflicts with F6's later additions.
          - id: C9
            summary: "Integration test: error → local edit → recovery → save"
            status: pending
            exit_criteria: >
              syncErrorRecovery.test.ts: simulate syncError being set, verify local edits
              succeed (state.tasks updates), simulate error clearing, verify scheduleSave
              writes full state.tasks on recovery.

  - name: "Stage 3: Onboarding Screens + Promotion + Sheet Creation (parallel — 2 agents)"
    description: >
      Two agents run in parallel. Group D builds welcome screens and empty state.
      Group E builds sheet creation and promotion. Both modify WelcomeGate.tsx —
      D merges first (routing logic), E rebases on D before merging (sandbox
      banner is a simple additive block). Agents START concurrently but E's
      merge is sequenced after D's merge.
    groups:
      - id: D
        name: "Design 3 — Onboarding Screens + Empty State"
        depends_on: [A, B, C]
        scope:
          modify:
            - src/components/onboarding/WelcomeGate.tsx
            - src/App.tsx
          create:
            - src/components/onboarding/FirstVisitWelcome.tsx
            - src/components/onboarding/ReturnVisitorWelcome.tsx
            - src/components/onboarding/CollaboratorWelcome.tsx
            - src/components/onboarding/ChoosePath.tsx
            - src/components/onboarding/EmptyState.tsx
          test:
            - src/components/onboarding/__tests__/FirstVisitWelcome.test.tsx
            - src/components/onboarding/__tests__/ReturnVisitorWelcome.test.tsx
            - src/components/onboarding/__tests__/CollaboratorWelcome.test.tsx
            - src/components/onboarding/__tests__/ChoosePath.test.tsx
            - src/components/onboarding/__tests__/EmptyState.test.tsx
          read_only:
            - src/types/index.ts
            - src/state/actions.ts
            - src/sheets/oauth.ts
            - src/utils/recentSheets.ts
            - src/components/onboarding/SheetSelector.tsx
        tasks:
          - id: D1
            summary: "Read WelcomeGate.tsx, App.tsx, recentSheets.ts, SheetSelector.tsx after Stage 2 merge"
            status: pending
          - id: D2
            summary: "Create FirstVisitWelcome.tsx — value props, [Try the demo], [Sign in with Google]"
            status: pending
            exit_criteria: >
              Value props visible without scrolling. [Try the demo] dispatches ENTER_SANDBOX.
              [Sign in with Google] triggers OAuth → on success renders ChoosePath (NOT sandbox).
              Component test verifies both actions.
          - id: D3
            summary: "Create ReturnVisitorWelcome.tsx — welcome back + recent projects with relative times"
            status: pending
            exit_criteria: >
              "Welcome back, {name}". Recent projects listed with title and relative time
              formatted from lastOpened (e.g. "2 hours ago"). Click → onSelectSheet →
              ?sheet=ID&room=ID. [New Project], [Connect Existing Sheet], [Demo] buttons.
          - id: D4
            summary: "Create CollaboratorWelcome.tsx — invited view with sign-in"
            status: pending
            exit_criteria: >
              "You've been invited to collaborate". Only [Sign in with Google] shown.
              After sign-in: GanttContext useEffect re-fires → loadFromSheet auto.
              No intermediate screen. Component does NOT call loadFromSheet directly.
          - id: D5
            summary: "Create ChoosePath.tsx — [New Project] + [Existing Sheet]"
            status: pending
            exit_criteria: >
              [New Project] and [Existing Sheet] buttons. Recent sheets shown if any exist.
              Component test verifies button rendering and recent sheets display.
          - id: D6
            summary: "Update WelcomeGate.tsx — replace placeholder with real screen routing"
            status: pending
            exit_criteria: >
              ?sheet= or ?room= + signed in → render children (loading, useEffect handles).
              ?sheet= or ?room= + NOT signed in → CollaboratorWelcome.
              No URL params + auth + recent sheets → ReturnVisitorWelcome.
              No URL params + auth + no recent → ChoosePath.
              No URL params + no auth → FirstVisitWelcome.
              WelcomeGate owns the onSelectSheet(sheetId) callback (sets URL params +
              dispatches SET_DATA_SOURCE) and passes it as a prop to ReturnVisitorWelcome,
              ChoosePath, and SheetSelector.
          - id: D7
            summary: "Create EmptyState.tsx — timeline scaffolding + add-task CTA"
            status: pending
            exit_criteria: >
              Renders in Gantt layout when dataSource='empty'. Timeline: grid, headers, today.
              Table: column headers + add-task input row. CTA: "Add your first task".
              First task: startDate=ensureBusinessDay(today), endDate=taskEndDate(startDate,1),
              duration=1. Dispatches ADD_TASK → reducer auto-transitions to 'sheet'.
              onSelectTemplate callback prop accepted but button hidden until Design 5 wires it.
          - id: D8
            summary: "Update App.tsx — render EmptyState in AppContent when dataSource='empty'"
            status: pending
            exit_criteria: "AppContent conditionally renders EmptyState when state.dataSource === 'empty'."

      - id: E
        name: "Design 4 — Sheet Creation + Sandbox Promotion Flow"
        depends_on: [A, B, C]
        merge_after: [D]          # E starts with D in parallel but merges after D (WelcomeGate.tsx)
        scope:
          modify:
            - src/components/onboarding/WelcomeGate.tsx   # sandbox banner only — merge after D
          create:
            - src/sheets/sheetCreation.ts
            - src/components/onboarding/PromotionFlow.tsx
            - src/components/onboarding/TargetSheetCheck.tsx
          test:
            - src/components/onboarding/__tests__/PromotionFlow.test.tsx
            - src/components/onboarding/__tests__/TargetSheetCheck.test.tsx
            - src/sheets/__tests__/sheetCreation.test.ts
          read_only:
            - src/types/index.ts
            - src/state/actions.ts
            - src/sheets/sheetsSync.ts
            - src/sheets/sheetsMapper.ts
            - src/sheets/oauth.ts
            - src/components/onboarding/SheetSelector.tsx
        tasks:
          - id: E1
            summary: "Read sheetsSync.ts (scheduleSave, initSync, startPolling), sheetsMapper.ts (validateHeaders), oauth.ts after Stage 2 merge"
            status: pending
          - id: E2
            summary: "Create sheetCreation.ts — createSheet(title) via Sheets API POST"
            status: pending
            exit_criteria: >
              Creates spreadsheet with title. Checks res.ok, throws on error.
              Returns spreadsheetId. Uses getAccessToken() from oauth.ts.
              Unit test with fetch mock.
          - id: E3
            summary: "Create TargetSheetCheck.tsx — three-way check (empty/Ganttlet/non-Ganttlet)"
            status: pending
            exit_criteria: >
              Empty sheet → proceed (no confirmation). Headers match SHEET_COLUMNS
              (via validateHeaders) → prompt: "This sheet has N existing tasks. Replace
              them with your current project, or open the existing data instead?"
              Actions: [Replace] / [Open existing]. Headers don't match → warn with
              primary [Create New Sheet] and secondary "Overwrite anyway".
              Component test covers all three paths.
          - id: E4
            summary: "Create PromotionFlow.tsx — destination picker + write + transition"
            status: pending
            exit_criteria: >
              If not signed in → signIn() first, flow resumes after OAuth completes.
              Destination picker: "Create new sheet" (recommended) or "Save to existing".
              Execution order: (1) update URL to ?sheet=ID&room=ID, (2) initSync(sheetId, callback),
              (3) startPolling(), (4) scheduleSave(state.tasks) — writes data + sets lastWriteHash,
              (5) dispatch SET_DATA_SOURCE('sheet') — activates auto-save/Yjs useEffects,
              (6) dispatch SET_SYNC_ERROR(null) + set sandboxDirty=false.
              All sandbox edits (new/deleted/moved tasks, changed deps) preserved in written data.
              Component test covers full flow.
          - id: E5
            summary: "Wire sandbox banner in WelcomeGate.tsx to PromotionFlow"
            status: pending
            exit_criteria: >
              dataSource='sandbox': persistent banner "You're exploring a demo project.
              Nothing is saved. [Save to Google Sheet]". Click opens PromotionFlow.

  - name: "Stage 4: Templates + Sheet Management (single agent)"
    description: >
      Template data, template picker, project creation, and header sheet management.
      Final stage — depends on all prior work.
    groups:
      - id: F
        name: "Design 5 — Templates + Project Creation + Sheet Management"
        depends_on: [A, B, C, D, E]
        scope:
          modify:
            - src/sheets/sheetCreation.ts
            - src/components/layout/Header.tsx
            - src/components/onboarding/EmptyState.tsx
          create:
            - src/data/templates/marketingCampaign.ts
            - src/data/templates/eventPlanning.ts
            - src/data/templates/index.ts
            - src/components/onboarding/TemplatePicker.tsx
          test:
            - src/data/templates/__tests__/templateValidation.test.ts
            - src/components/onboarding/__tests__/TemplatePicker.test.tsx
            - src/components/layout/__tests__/Header.test.tsx
          read_only:
            - src/types/index.ts
            - src/state/actions.ts
            - src/sheets/sheetsSync.ts
            - src/sheets/sheetsMapper.ts
            - src/sheets/oauth.ts
            - src/data/templates/softwareRelease.ts
            - src/utils/recentSheets.ts
            - src/components/onboarding/SheetSelector.tsx
            - src/components/onboarding/WelcomeGate.tsx
        tasks:
          - id: F1
            summary: "Read sheetCreation.ts, Header.tsx, EmptyState.tsx, softwareRelease.ts after Stage 3 merge"
            status: pending
          - id: F2
            summary: "Create marketingCampaign.ts and eventPlanning.ts (~10 tasks each)"
            status: pending
            exit_criteria: >
              ~10 tasks each. No weekend dates. duration === taskDuration(startDate, endDate).
              endDate === taskEndDate(startDate, duration). parentId ↔ childIds consistent.
              Valid UUIDs. No UI state fields.
          - id: F3
            summary: "Create templates/index.ts — registry with Blank + 3 templates, lazy loading"
            status: pending
            exit_criteria: >
              Template interface (id, name, description, taskCount, load).
              Blank entry (taskCount:0, load returns {tasks:[], changeHistory:[]}).
              3 named templates with lazy import().
              templateValidation.test.ts validates all templates pass constraints.
          - id: F4
            summary: "Create TemplatePicker.tsx — template selection UI"
            status: pending
            exit_criteria: "Template cards with name, description, count. onSelect(templateId) callback. Component test."
          - id: F5
            summary: "Add createProjectFromTemplate to sheetCreation.ts"
            status: pending
            exit_criteria: >
              Creates sheet via createSheet(name). Writes row 1 = 20 SHEET_COLUMNS headers.
              Writes rows 2+ = template task rows. Write range from SHEET_COLUMNS.length.
              Updates URL to ?sheet=ID&room=ID. Calls initSync + startPolling.
              Non-blank: calls scheduleSave(tasks), dispatches SET_DATA_SOURCE('sheet').
              Blank: dispatches SET_DATA_SOURCE('empty'), empty state UI renders.
          - id: F6
            summary: "Add sheet management to Header.tsx — title, share, dropdown, disconnect"
            status: pending
            exit_criteria: >
              Sheet title from GET /v4/spreadsheets/{id}?fields=properties.title. Clickable → new tab.
              Share: copies URL + adds ?room= if missing. Toast: "Link copied. Anyone with
              access to the Google Sheet can collaborate."
              Dropdown menu: "Open in Google Sheets" (new tab), "Switch sheet" (opens SheetSelector →
              disconnect current polling/auto-save/Yjs + load new sheet through full connection cycle),
              "Create new project" (opens TemplatePicker), "Disconnect" (clear ?sheet= and ?room=,
              stopPolling(), disconnect Yjs, dispatch RESET_STATE → WelcomeGate renders return-visitor
              variant. Auth persists in localStorage — RESET_STATE does NOT clear Google auth).
              Header test covers share, disconnect, and switch behaviors.
          - id: F7
            summary: "Wire EmptyState 'Start from template' to TemplatePicker"
            status: pending
            exit_criteria: "'Or start from a template' button visible. Opens TemplatePicker on click."

validation_agent:
  name: "Integration Tests + Full Verification"
  scope:
    modify:
      - src/state/__tests__/ganttReducer.test.ts
    read_only:
      - src/types/index.ts
      - src/state/GanttContext.tsx
      - src/components/onboarding/WelcomeGate.tsx
      - src/sheets/sheetsSync.ts
  tasks:
    - id: V-E1
      summary: "Run full-verify.sh — tsc, vitest, cargo test"
      status: pending
      exit_criteria: "All TypeScript compiles. All unit tests pass. All Rust tests pass."
    - id: V-E2
      summary: "Verify state machine transitions end-to-end"
      status: pending
      exit_criteria: >
        undefined→sandbox (ENTER_SANDBOX), undefined→loading→sheet (loadFromSheet success),
        undefined→loading→empty→sheet (empty sheet + first task), loading+error stays loading
        with syncError set. Sign-in during sandbox: dataSource stays 'sandbox'.
    - id: V-E3
      summary: "Verify sandbox isolation: no API calls, no WebSocket, dirty tracking"
      status: pending
      exit_criteria: >
        Zero network requests in sandbox. sandboxDirty=true after edit.
        beforeunload triggers when dirty. No beforeunload when not dirty.
    - id: V-E4
      summary: "Verify error UI: each syncError type renders correctly, editing unblocked"
      status: pending
      exit_criteria: >
        auth: banner + [Re-authorize]. not_found: banner + polling stopped + removed from recent.
        forbidden: banner + polling stopped. network: banner. rate_limit: status indicator only.
        All error states allow local editing. On recovery, scheduleSave writes full state.tasks.
    - id: V-E5
      summary: "Verify all 3 templates pass constraint checks"
      status: pending
